name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Verify tag/version matches package.json
        run: |
          RAW="${{ github.event.inputs.version || github.ref_name }}"
          EXPECTED="${RAW#v}"
          ACTUAL=$(node -p "require('./package.json').version")
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "Version mismatch: tag/input '$RAW' -> $EXPECTED, package.json has $ACTUAL"
            echo "Update package.json to match before tagging, or use matching version for workflow_dispatch"
            exit 1
          fi
          echo "Version OK: $ACTUAL"

  build-macos:
    needs: verify
    runs-on: macos-latest
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build macOS installer
        run: yarn dist:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: dist/*.dmg
          archive: false

      - name: Upload macOS update manifest
        uses: actions/upload-artifact@v7
        with:
          name: macos-yml
          path: dist/latest-mac.yml
          archive: false

  build-linux:
    needs: verify
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Linux installer
        run: yarn dist:linux

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage
          path: dist/*.AppImage
          archive: false

      - name: Upload Linux update manifest
        uses: actions/upload-artifact@v7
        with:
          name: linux-yml
          path: dist/latest-linux.yml
          archive: false
      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: dist/*.deb
          archive: false

  build-windows:
    needs: verify
    runs-on: windows-latest
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Windows installer
        run: yarn dist:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe
          path: dist/*.exe
          archive: false

      - name: Upload Windows update manifest
        uses: actions/upload-artifact@v7
        with:
          name: windows-yml
          path: dist/latest.yml
          archive: false

  create-release:
    needs: [verify, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
